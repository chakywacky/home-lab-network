<?xml version="1.0" encoding="UTF-8"?>
<svg id="networkTopology" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1100" >
                    <defs>
                        <linearGradient id="routerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
                        </linearGradient>
                        <linearGradient id="switchGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
                        </linearGradient>
                        <linearGradient id="ciscoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#27ae60;stop-opacity:1" />
                        </linearGradient>
                        <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
                            <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
                            <feOffset dx="2" dy="2" result="offsetblur"/>
                            <feComponentTransfer>
                                <feFuncA type="linear" slope="0.3"/>
                            </feComponentTransfer>
                            <feMerge>
                                <feMergeNode/>
                                <feMergeNode in="SourceGraphic"/>
                            </feMerge>
                        </filter>
                    </defs>
                    
                    <text x="600" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#ffffff">
                        Network Topology - Click devices for details
                    </text>
                    
                    <!-- Internet -->
                    <ellipse cx="600" cy="120" rx="80" ry="50" fill="#ecf0f1" stroke="#95a5a6" stroke-width="3" filter="url(#shadow)"/>
                    <text x="600" y="120" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#34495e">Internet</text>
                    <text x="600" y="138" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#7f8c8d">(ISP)</text>
                    
                    <!-- Fiber Connection -->
                    <line x1="600" y1="170" x2="600" y2="240" stroke="#34495e" stroke-width="3" stroke-dasharray="5,5"/>
                    <text x="620" y="210" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">Fiber</text>
                    
                    <!-- Verizon FiOS Router - Clickable -->
                    <g class="device-area" role="button" tabindex="0" data-device="fios" filter="url(#shadow)">
                        <rect x="480" y="240" width="240" height="100" rx="8" fill="url(#routerGrad)" stroke="#c0392b" stroke-width="2"/>
                        <line x1="520" y1="240" x2="520" y2="220" stroke="#fff" stroke-width="3"/>
                        <circle cx="520" cy="215" r="5" fill="none" stroke="#fff" stroke-width="2"/>
                        <line x1="560" y1="240" x2="560" y2="220" stroke="#fff" stroke-width="3"/>
                        <circle cx="560" cy="215" r="5" fill="none" stroke="#fff" stroke-width="2"/>
                        <line x1="640" y1="240" x2="640" y2="220" stroke="#fff" stroke-width="3"/>
                        <circle cx="640" cy="215" r="5" fill="none" stroke="#fff" stroke-width="2"/>
                        <line x1="680" y1="240" x2="680" y2="220" stroke="#fff" stroke-width="3"/>
                        <circle cx="680" cy="215" r="5" fill="none" stroke="#fff" stroke-width="2"/>
                        <text x="600" y="280" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#ffffff">Verizon FiOS</text>
                        <text x="600" y="300" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#ecf0f1">Router/Modem</text>
                        <text x="600" y="320" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#ecf0f1">192.168.1.1</text>
                    </g>
                    
                    <!-- WAN Connection -->
                    <line x1="600" y1="340" x2="600" y2="400" stroke="#27ae60" stroke-width="4"/>
                    <text x="620" y="370" font-family="Arial, sans-serif" font-size="11" fill="#2ecc71" font-weight="bold">WAN</text>
                    
                    <!-- Cisco 2911 Router - Clickable -->
                    <g class="device-area" role="button" tabindex="0" data-device="cisco2911" filter="url(#shadow)">
                        <rect x="480" y="400" width="240" height="100" rx="8" fill="url(#ciscoGrad)" stroke="#27ae60" stroke-width="2"/>
                        <line x1="520" y1="400" x2="520" y2="380" stroke="#fff" stroke-width="3"/>
                        <circle cx="520" cy="375" r="5" fill="none" stroke="#fff" stroke-width="2"/>
                        <line x1="560" y1="400" x2="560" y2="380" stroke="#fff" stroke-width="3"/>
                        <circle cx="560" cy="375" r="5" fill="none" stroke="#fff" stroke-width="2"/>
                        <line x1="640" y1="400" x2="640" y2="380" stroke="#fff" stroke-width="3"/>
                        <circle cx="640" cy="375" r="5" fill="none" stroke="#fff" stroke-width="2"/>
                        <text x="600" y="440" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#ffffff">Cisco 2911 ISR</text>
                        <text x="600" y="460" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#ecf0f1">Edge Router</text>
                        <text x="600" y="480" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#ecf0f1">192.168.1.3</text>
                    </g>
                    
                    <!-- Trunk Connection -->
                    <line x1="600" y1="500" x2="600" y2="560" stroke="#e67e22" stroke-width="4"/>
                    <text x="620" y="530" font-family="Arial, sans-serif" font-size="11" fill="#e67e22" font-weight="bold">Trunk</text>
                    <text x="540" y="530" font-family="Arial, sans-serif" font-size="9" fill="#e67e22">All VLANs</text>
                    
                    <!-- Cisco 3560X Switch - Clickable -->
                    <g class="device-area" role="button" tabindex="0" data-device="switch" filter="url(#shadow)">
                        <rect x="400" y="560" width="400" height="120" rx="8" fill="url(#switchGrad)" stroke="#2980b9" stroke-width="2"/>
                        <circle cx="450" cy="590" r="6" fill="#2ecc71"/>
                        <circle cx="470" cy="590" r="6" fill="#2ecc71"/>
                        <circle cx="490" cy="590" r="6" fill="#2ecc71"/>
                        <circle cx="510" cy="590" r="6" fill="#2ecc71"/>
                        <circle cx="530" cy="590" r="6" fill="#f39c12"/>
                        <circle cx="550" cy="590" r="6" fill="#95a5a6"/>
                        <circle cx="570" cy="590" r="6" fill="#95a5a6"/>
                        <circle cx="590" cy="590" r="6" fill="#95a5a6"/>
                        <circle cx="610" cy="590" r="6" fill="#2ecc71"/>
                        <circle cx="630" cy="590" r="6" fill="#2ecc71"/>
                        <circle cx="650" cy="590" r="6" fill="#2ecc71"/>
                        <circle cx="670" cy="590" r="6" fill="#2ecc71"/>
                        <circle cx="690" cy="590" r="6" fill="#2ecc71"/>
                        <circle cx="710" cy="590" r="6" fill="#2ecc71"/>
                        <circle cx="730" cy="590" r="6" fill="#2ecc71"/>
                        <circle cx="750" cy="590" r="6" fill="#2ecc71"/>
                        <text x="600" y="630" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#ffffff">Cisco Catalyst 3560X</text>
                        <text x="600" y="650" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#ecf0f1">Layer 2/3 Switch (PoE+)</text>
                        <text x="600" y="668" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#ecf0f1">192.168.1.2</text>
                    </g>
                    
                    <!-- Connections to End Devices -->
                    <line x1="450" y1="680" x2="350" y2="800" stroke="#9b59b6" stroke-width="3"/>
                    <circle cx="450" cy="680" r="5" fill="#9b59b6"/>
                    
                    <!-- Wireless AP - Clickable -->
                    <g class="device-area" role="button" tabindex="0" data-device="ap">
                        <rect x="300" y="800" width="100" height="70" rx="5" fill="#9b59b6" stroke="#8e44ad" stroke-width="2" filter="url(#shadow)"/>
                        <circle cx="330" cy="825" r="8" fill="#ecf0f1"/>
                        <circle cx="330" cy="825" r="4" fill="#9b59b6"/>
                        <path d="M 340 815 Q 345 810, 350 815" stroke="#ecf0f1" fill="none" stroke-width="2"/>
                        <path d="M 340 820 Q 345 815, 350 820" stroke="#ecf0f1" fill="none" stroke-width="2"/>
                        <path d="M 340 825 Q 345 820, 350 825" stroke="#ecf0f1" fill="none" stroke-width="2"/>
                        <text x="350" y="885" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#fff">Wireless AP</text>
                        <text x="350" y="898" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#ecf0f1">VLAN 30</text>
                    </g>
                    
                    <!-- IP Camera - Clickable -->
                    <line x1="600" y1="680" x2="500" y2="800" stroke="#9b59b6" stroke-width="3"/>
                    <circle cx="600" cy="680" r="5" fill="#9b59b6"/>
                    <g class="device-area" role="button" tabindex="0" data-device="camera">
                        <rect x="450" y="800" width="100" height="70" rx="5" fill="#9b59b6" stroke="#8e44ad" stroke-width="2" filter="url(#shadow)"/>
                        <circle cx="485" cy="825" r="12" fill="#ecf0f1"/>
                        <circle cx="485" cy="825" r="6" fill="#34495e"/>
                        <rect x="500" y="835" width="30" height="20" rx="3" fill="#ecf0f1"/>
                        <text x="500" y="885" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#fff">IP Camera</text>
                        <text x="500" y="898" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#ecf0f1">VLAN 40</text>
                    </g>
                    
                    <!-- Workstation 1 - Clickable -->
                    <line x1="700" y1="680" x2="650" y2="800" stroke="#16a085" stroke-width="3"/>
                    <circle cx="700" cy="680" r="5" fill="#16a085"/>
                    <g class="device-area" role="button" tabindex="0" data-device="workstation">
                        <rect x="600" y="800" width="100" height="70" rx="5" fill="#16a085" stroke="#138d75" stroke-width="2" filter="url(#shadow)"/>
                        <circle cx="650" cy="820" r="8" fill="#ecf0f1"/>
                        <rect x="635" y="830" width="30" height="25" rx="2" fill="#ecf0f1"/>
                        <text x="650" y="885" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#fff">Workstation</text>
                        <text x="650" y="898" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#ecf0f1">VLAN 10</text>
                    </g>
                    
                    <!-- Workstation 2 - NOW CLICKABLE -->
                    <line x1="800" y1="680" x2="800" y2="800" stroke="#16a085" stroke-width="3"/>
                    <circle cx="800" cy="680" r="5" fill="#16a085"/>
                    <g class="device-area" role="button" tabindex="0" data-device="workstation">
                        <rect x="750" y="800" width="100" height="70" rx="5" fill="#16a085" stroke="#138d75" stroke-width="2" filter="url(#shadow)"/>
                        <circle cx="800" cy="820" r="8" fill="#ecf0f1"/>
                        <rect x="785" y="830" width="30" height="25" rx="2" fill="#ecf0f1"/>
                        <text x="800" y="885" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#fff">Workstation</text>
                        <text x="800" y="898" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#ecf0f1">VLAN 10</text>
                    </g>
                    
                    <!-- Server - Clickable -->
                    <line x1="450" y1="680" x2="950" y2="800" stroke="#d35400" stroke-width="3"/>
                    <circle cx="450" cy="680" r="5" fill="#d35400"/>
                    <g class="device-area" role="button" tabindex="0" data-device="server">
                        <rect x="900" y="800" width="100" height="70" rx="5" fill="#d35400" stroke="#ba4a00" stroke-width="2" filter="url(#shadow)"/>
                        <rect x="915" y="815" width="70" height="40" rx="2" fill="#34495e"/>
                        <circle cx="925" cy="825" r="2" fill="#2ecc71"/>
                        <circle cx="925" cy="835" r="2" fill="#2ecc71"/>
                        <circle cx="925" cy="845" r="2" fill="#f39c12"/>
                        <text x="950" y="885" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#fff">Server</text>
                        <text x="950" y="898" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#ecf0f1">VLAN 10</text>
                    </g>
                    
                    <!-- Legend -->
                    <g transform="translate(50, 950)">
                        <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Legend:</text>
                        <line x1="0" y1="15" x2="30" y2="15" stroke="#27ae60" stroke-width="4"/>
                        <text x="35" y="20" font-family="Arial, sans-serif" font-size="11" fill="#ffffff">Gigabit WAN</text>
                        <line x1="0" y1="35" x2="30" y2="35" stroke="#e67e22" stroke-width="4"/>
                        <text x="35" y="40" font-family="Arial, sans-serif" font-size="11" fill="#ffffff">Trunk (All VLANs)</text>
                        <line x1="0" y1="55" x2="30" y2="55" stroke="#9b59b6" stroke-width="3"/>
                        <text x="35" y="60" font-family="Arial, sans-serif" font-size="11" fill="#ffffff">PoE Connection</text>
                        <line x1="0" y1="75" x2="30" y2="75" stroke="#16a085" stroke-width="3"/>
                        <text x="35" y="80" font-family="Arial, sans-serif" font-size="11" fill="#ffffff">Access Port</text>
                    </g>
                    
                    <!-- IP Addressing Info -->
                    <g transform="translate(880, 980)">
                        <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Network Info:</text>
                        <text x="0" y="20" font-family="Arial, sans-serif" font-size="11" fill="#ffffff">• FiOS WAN: Dynamic Public IP</text>
                        <text x="0" y="38" font-family="Arial, sans-serif" font-size="11" fill="#ffffff">• 2911 WAN: 192.168.1.100/24</text>
                        <text x="0" y="56" font-family="Arial, sans-serif" font-size="11" fill="#ffffff">• VLANs: 10(Mgmt), 20(Work), 30(Srv), 40(Voice)</text>
                        <text x="0" y="74" font-family="Arial, sans-serif" font-size="11" fill="#ffffff">• Router-on-a-Stick + NAT/PAT</text>
                    </g>
                </svg>
